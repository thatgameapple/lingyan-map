  <g transform="translate(0,418)">
    <rect x="0" y="0" width="84" height="22" rx="4" fill="#5c3d12"/>

    <text x="23" y="14" text-anchor="middle" font-size="9" fill="white" font-weight="bold">厕所</text>

  <line x1="824" y1="120" x2="836" y2="120" stroke="white" stroke-width="1.4" stroke-linecap="round"/>

  <g transform="translate(62,70)">
