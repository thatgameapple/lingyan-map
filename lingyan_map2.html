<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>灵山景区手绘地图</title>
<style>
  body { margin:0; background:#9e8e78; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; box-sizing:border-box; }
</style>
</head>
<body>
<svg width="1050" height="720" viewBox="0 0 1050 720"
     xmlns="http://www.w3.org/2000/svg"
     style="font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; max-width:100%;">

<defs>
  <!-- 背景纸色 -->
  <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#f8f0de"/>
    <stop offset="50%"  stop-color="#f2e8d0"/>
    <stop offset="100%" stop-color="#ebe0c0"/>
  </linearGradient>
  <!-- 山体渐变 -->
  <linearGradient id="mtnA" x1="0" y1="0" x2="0.2" y2="1">
    <stop offset="0%"   stop-color="#c8d898"/>
    <stop offset="100%" stop-color="#9ab870"/>
  </linearGradient>
  <linearGradient id="mtnB" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0%"   stop-color="#b8cc88"/>
    <stop offset="100%" stop-color="#8aaa58"/>
  </linearGradient>
  <linearGradient id="mtnC" x1="0" y1="0" x2="0.1" y2="1">
    <stop offset="0%"   stop-color="#d0e0a8"/>
    <stop offset="100%" stop-color="#a8c880"/>
  </linearGradient>
  <!-- 水彩纸纹理滤镜 -->
  <filter id="roughen">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="ink">
    <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <!-- 路线投影 -->
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
  </filter>
</defs>
