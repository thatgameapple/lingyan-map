<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">

<style>
* { box-sizing:border-box; }
body { margin:0; padding:0; font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; }
#map { width:100vw; height:100vh; }

#title-box {
  position:absolute; top:18px; left:50%; transform:translateX(-50%);
  z-index:1000; background:rgba(10,6,2,0.72); color:white; text-align:center;
  padding:9px 28px 8px; border-radius:5px;
  border:1px solid rgba(255,255,255,0.22); backdrop-filter:blur(4px); pointer-events:none;
}
#title-box h2 { margin:0; font-size:17px; font-weight:bold; letter-spacing:5px; }
#title-box p  { margin:3px 0 0; font-size:9.5px; opacity:0.72; letter-spacing:2.5px; }

#legend {
  position:absolute; bottom:36px; left:18px; z-index:1000;
  background:rgba(10,6,2,0.68); color:white; padding:10px 14px; border-radius:6px;
  font-size:11px; line-height:1.5; border:1px solid rgba(255,255,255,0.18); backdrop-filter:blur(4px);
  min-width:130px;
}
#legend .sec { font-size:9px; opacity:0.5; margin:7px 0 3px; letter-spacing:1px; }
#legend .row { display:flex; align-items:center; gap:7px; margin:3px 0; }
.l-line { width:24px; height:4px; border-radius:2px; flex-shrink:0; }
.l-dot  { width:10px; height:10px; border-radius:50%; border:2px solid white; flex-shrink:0; }

#shot-btn {
  position:absolute; top:18px; left:18px; z-index:1001;
  background:rgba(10,6,2,0.70); color:white;
  border:1px solid rgba(255,255,255,0.25);
  padding:6px 12px; border-radius:4px; font-size:12px;
  cursor:pointer; font-family:inherit; backdrop-filter:blur(4px);
}
#shot-btn:hover { background:rgba(50,30,5,0.88); }
</style>
</head>
<body>

  <h2>登山路线图</h2>

function px(sx,sy){ return [REF_LAT+(sy-REF_Y)*LAT_PX, REF_LNG+(sx-REF_X)*LNG_PX]; }

function poiIcon(name, color) {
  var paths = POI_SVG[name] || '<circle cx="10" cy="10" r="5" fill="white"/>';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="14" height="14">'+paths+'</svg>';
  return L.divIcon({
    className:'',
    html:'<div style="display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7));">' +
      '<div style="background:'+color+';border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.9);">'+svg+'</div>' +

      '</div>',
    iconSize:null, iconAnchor:[13,13]
  });
}

// ============================================================
// 导出高清图
// ============================================================
function exportHighRes() {
  var btn = document.getElementById('shot-btn');
  var legend = document.getElementById('legend');
  var title = document.getElementById('title-box');
  var ctrl = document.querySelector('.leaflet-control-container');
  [btn,legend,title,ctrl].forEach(function(el){ if(el) el.style.visibility='hidden'; });
  setTimeout(function(){
    html2canvas(document.body,{
      useCORS:true, scale:2, logging:false, allowTaint:false,
      width:window.innerWidth, height:window.innerHeight
    }).then(function(canvas){
      [btn,legend,title,ctrl].forEach(function(el){ if(el) el.style.visibility=''; });
      var link=document.createElement('a');
      link.download='灵山登山路线图.png';
      link.href=canvas.toDataURL('image/png',1.0);
      link.click();
    }).catch(function(){
      [btn,legend,title,ctrl].forEach(function(el){ if(el) el.style.visibility=''; });
    });
  },600);
}
