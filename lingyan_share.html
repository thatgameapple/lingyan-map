<style>
* { box-sizing:border-box; }
body { margin:0; padding:0; font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; }
#map { width:100vw; height:100vh; }

#title-box {
  position:absolute; top:18px; left:50%; transform:translateX(-50%);
  z-index:1000; background:rgba(10,6,2,0.72); color:white; text-align:center;
  padding:9px 28px 8px; border-radius:5px;
  border:1px solid rgba(255,255,255,0.22); backdrop-filter:blur(4px); pointer-events:none;
}
#title-box h2 { margin:0; font-size:17px; font-weight:bold; letter-spacing:5px; }
#title-box p  { margin:3px 0 0; font-size:9.5px; opacity:0.72; letter-spacing:2.5px; }

#legend {
  position:absolute; bottom:36px; left:18px; z-index:1000;
  background:rgba(10,6,2,0.68); color:white; padding:10px 14px; border-radius:6px;
  font-size:11px; line-height:1.5; border:1px solid rgba(255,255,255,0.18); backdrop-filter:blur(4px);
  min-width:130px;
}
#legend .sec { font-size:9px; opacity:0.5; margin:7px 0 3px; letter-spacing:1px; }
#legend .row { display:flex; align-items:center; gap:7px; margin:3px 0; }
.l-line { width:24px; height:4px; border-radius:2px; flex-shrink:0; }
.l-dot  { width:10px; height:10px; border-radius:50%; border:2px solid white; flex-shrink:0; }
.route-card { display:flex; align-items:center; gap:8px; margin:4px 0; }
.rc-line { width:24px; height:5px; border-radius:3px; flex-shrink:0; }
.rc-info { display:flex; flex-direction:column; gap:1px; }
.rc-name { font-size:11px; font-weight:700; color:white; }
.rc-stars { font-size:10px; letter-spacing:1px; }
.rc-level { font-size:9px; opacity:0.55; }

#shot-btn {
  position:absolute; top:18px; left:18px; z-index:1001;
  background:rgba(10,6,2,0.70); color:white;
  border:1px solid rgba(255,255,255,0.25);
  padding:6px 12px; border-radius:4px; font-size:12px;
  cursor:pointer; font-family:inherit; backdrop-filter:blur(4px);
}
#shot-btn:hover { background:rgba(50,30,5,0.88); }
</style>

function poiIcon(name, color) {
  var paths = POI_SVG[name] || '<circle cx="10" cy="10" r="5" fill="white"/>';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="14" height="14">'+paths+'</svg>';
  return L.divIcon({
    className:'',
    html:'<div style="display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7));">' +
      '<div style="background:'+color+';border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.9);">'+svg+'</div>' +
      '<div style="background:rgba(0,0,0,0.72);color:white;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:2px;margin-top:2px;letter-spacing:0.2px;white-space:nowrap;">'+name+'</div>' +
      '</div>',
    iconSize:null, iconAnchor:[13,13]
  });
}

// ============================================================
// 导出高清图（纯canvas方案，不依赖html2canvas）
// ============================================================
function exportHighRes() {
  var scale = 2;
  var W = window.innerWidth, H = window.innerHeight;
  var canvas = document.createElement('canvas');
  canvas.width  = W * scale;
  canvas.height = H * scale;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 抓取所有已加载的卫星瓦片并绘制到 canvas
  var tiles = document.querySelectorAll('.leaflet-tile-pane img.leaflet-tile-loaded');
  var pending = tiles.length || 1;
  function onTileDone() {
    pending--;
    if (pending > 0) return;
    drawOverlays();
  }
  if (tiles.length === 0) { drawOverlays(); return; }
  tiles.forEach(function(img) {
    var rect = img.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) { onTileDone(); return; }
    var tmp = new Image();
    tmp.crossOrigin = 'anonymous';
    tmp.onload  = function() {
      ctx.drawImage(tmp, rect.left*scale, rect.top*scale, rect.width*scale, rect.height*scale);
      onTileDone();
    };
    tmp.onerror = function() { onTileDone(); };
    tmp.src = img.src + (img.src.indexOf('?') >= 0 ? '&_=1' : '?_=1');
  });

  function drawOverlays() {
      // ---- 绘制路线 ----
      ROUTES.forEach(function(r){
        var pts = r.pts.map(function(ll){ return map.latLngToContainerPoint(ll); });
        ctx.beginPath();
        pts.forEach(function(p,i){ i===0 ? ctx.moveTo(p.x*scale,p.y*scale) : ctx.lineTo(p.x*scale,p.y*scale); });
        if(r.branch){
          ctx.setLineDash([7*scale,6*scale]);
          ctx.strokeStyle = 'rgba(255,255,255,0.6)';
          ctx.lineWidth = 2.5*scale;
          ctx.lineJoin='round'; ctx.lineCap='round';
          ctx.stroke();
          ctx.setLineDash([]);
        } else {
          ctx.setLineDash([]);
          ctx.strokeStyle = 'rgba(255,255,255,0.38)';
          ctx.lineWidth = 5.5*scale;
          ctx.lineJoin='round'; ctx.lineCap='round';
          ctx.stroke();
          ctx.beginPath();
          pts.forEach(function(p,i){ i===0 ? ctx.moveTo(p.x*scale,p.y*scale) : ctx.lineTo(p.x*scale,p.y*scale); });
          ctx.strokeStyle = r.color;
          ctx.lineWidth = 3.5*scale;
          ctx.stroke();
        }
      });

      // ---- 绘制 POI 标注（带图标） ----
      var R = 9 * scale;
      var iconSize = 14 * scale;
      ctx.font = 'bold ' + (9.5*scale) + 'px PingFang SC,Microsoft YaHei,sans-serif';
      ctx.textAlign = 'center';
      var poiTotal = POIS.length, poiDone = 0;
      function checkDone() {
        poiDone++;
        if (poiDone < poiTotal) return;
        var link = document.createElement('a');
        link.download = '灵山登山路线图.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
      }
      function drawPoiLabel(ctx, p, cx, cy) {
        var label = p.id;
        var tw = ctx.measureText(label).width;
        var lh = 10 * scale, lpad = 4 * scale;
        var lx = cx - tw/2 - lpad, ly = cy + R + 2*scale;
        ctx.fillStyle = 'rgba(0,0,0,0.72)';
        ctx.fillRect(lx, ly, tw + lpad*2, lh + 2*scale);
        ctx.fillStyle = 'white';
        ctx.fillText(label, cx, ly + lh - 1*scale);
      }
      POIS.forEach(function(p){
        var pt = map.latLngToContainerPoint(p.latlng);
        var cx = pt.x * scale, cy = pt.y * scale;
        // 圆形背景
        ctx.beginPath();
        ctx.arc(cx, cy, R, 0, Math.PI*2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 2 * scale;
        ctx.stroke();
        // 标签
        drawPoiLabel(ctx, p, cx, cy);
        // SVG图标
        var paths = POI_SVG[p.id] || '<circle cx="10" cy="10" r="5" fill="white"/>';
        var svgStr = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="'+iconSize+'" height="'+iconSize+'">'+paths+'</svg>';
        var svgUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
        var img = new Image();
        img.onload = function() {
          ctx.drawImage(img, cx - iconSize/2, cy - iconSize/2, iconSize, iconSize);
          checkDone();
        };
        img.onerror = function() { checkDone(); };
        img.src = svgUrl;
      });

      // ---- 绘制标题框 ----
      var titleFont1 = 'bold ' + (17*scale) + 'px PingFang SC,Microsoft YaHei,sans-serif';
      var titleFont2 = (9.5*scale) + 'px PingFang SC,Microsoft YaHei,sans-serif';
      ctx.font = titleFont1;
      var tw1 = ctx.measureText('登山路线图').width;
      ctx.font = titleFont2;
      var tw2 = ctx.measureText('太行灵山景区 · 白鹿泉').width;
      var tboxW = Math.max(tw1, tw2) + 28*2*scale;
      var tboxH = (9+17+4+9.5+8)*scale;
      var tboxX = (W*scale - tboxW) / 2;
      var tboxY = 18*scale;
      ctx.fillStyle = 'rgba(10,6,2,0.72)';
      ctx.fillRect(tboxX, tboxY, tboxW, tboxH);
      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = scale;
      ctx.strokeRect(tboxX, tboxY, tboxW, tboxH);
      ctx.textAlign = 'center';
      ctx.fillStyle = 'white';
      ctx.font = titleFont1;
      ctx.letterSpacing = (5*scale)+'px';
      ctx.fillText('登山路线图', W*scale/2, tboxY + 9*scale + 17*scale);
      ctx.font = titleFont2;
      ctx.letterSpacing = (2.5*scale)+'px';
      ctx.globalAlpha = 0.72;
      ctx.fillText('太行灵山景区 · 白鹿泉', W*scale/2, tboxY + 9*scale + 17*scale + 4*scale + 9.5*scale);
      ctx.globalAlpha = 1;
      ctx.letterSpacing = '0px';

      // ---- 绘制图例 ----
      var lFont  = 'bold ' + (11*scale) + 'px PingFang SC,Microsoft YaHei,sans-serif';
      var lsFont = (9*scale)  + 'px PingFang SC,Microsoft YaHei,sans-serif';
      ctx.font = lFont;
      var poiCats = [['#7b5ea7','宗教场所'],['#b86018','景点'],['#2d7828','餐饮'],['#3d78a8','设施'],
                     ['#4a6fa5','停车场'],['#1d4ed8','学府'],['#6b7280','企业'],
                     ['#5c7a3e','亭子'],['#7c6f5e','遗址'],['#5c3d12','最高处']];
      var mainRoutes = ROUTES.filter(function(r){return !r.branch;});
      var rows = mainRoutes.length*2 + poiCats.length + 3; // 3 section headers + stars rows
      var lRowH = 14*scale, lPad = 10*scale;
      var lW = 145*scale, lH = lPad*2 + rows*lRowH;
      var lX = 18*scale, lY = (H - 36)*scale - lH;
      ctx.fillStyle = 'rgba(10,6,2,0.68)';
      ctx.fillRect(lX, lY, lW, lH);
      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = scale;
      ctx.strokeRect(lX, lY, lW, lH);
      ctx.textAlign = 'left';
      var ly2 = lY + lPad;
      function legendSection(label) {
        ctx.font = lsFont;
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText(label, lX+lPad, ly2 + 9*scale);
        ly2 += lRowH;
      }
      function legendMainRoute(r) {
        // 色块 + 名称
        ctx.fillStyle = r.color;
        ctx.fillRect(lX+lPad, ly2 + 4*scale, 24*scale, 5*scale);
        ctx.font = 'bold '+(11*scale)+'px PingFang SC,Microsoft YaHei,sans-serif';
        ctx.fillStyle = 'white';
        ctx.fillText(r.name, lX+lPad+30*scale, ly2 + 11*scale);
        ly2 += lRowH;
        // 星级 + 难度
        ctx.font = (9*scale)+'px PingFang SC,Microsoft YaHei,sans-serif';
        ctx.fillStyle = r.color;
        ctx.fillText(r.difficulty, lX+lPad+30*scale, ly2 + 9*scale);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText(' ' + r.level, lX+lPad+30*scale + ctx.measureText(r.difficulty).width + 4*scale, ly2 + 9*scale);
        ly2 += lRowH;
      }
      function legendDot(color, name) {
        ctx.beginPath();
        ctx.arc(lX+lPad+5*scale, ly2+5*scale, 5*scale, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1.5*scale;
        ctx.stroke();
        ctx.font = lFont;
        ctx.fillStyle = 'white';
        ctx.fillText(name, lX+lPad+16*scale, ly2+10*scale);
        ly2 += lRowH;
      }
      legendSection('主要路线');
      mainRoutes.forEach(function(r){ legendMainRoute(r); });
      legendSection('支线');
      ctx.strokeStyle = '#aaaaaa'; ctx.setLineDash([4*scale,3*scale]); ctx.lineWidth=1.5*scale;
      ctx.beginPath(); ctx.moveTo(lX+lPad, ly2+5*scale); ctx.lineTo(lX+lPad+24*scale, ly2+5*scale); ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = lFont; ctx.fillStyle='rgba(255,255,255,0.55)';
      ctx.fillText('辅助支线', lX+lPad+30*scale, ly2+10*scale);
      ly2 += lRowH;
      legendSection('标注');
      poiCats.forEach(function(c){ legendDot(c[0], c[1]); });

  }
}
