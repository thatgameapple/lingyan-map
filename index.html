<html><head>
<meta charset="UTF-8">
<title>灵山景区登山路线 · 卫星图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; }
body { margin:0; padding:0; font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; }
#map { width:100vw; height:100vh; }

#title-box {
  position:absolute; top:18px; left:50%; transform:translateX(-50%);
  z-index:1000; background:rgba(10,6,2,0.72); color:white; text-align:center;
  padding:9px 28px 8px; border-radius:5px;
  border:1px solid rgba(255,255,255,0.22); backdrop-filter:blur(4px); pointer-events:none;
}
#title-box h2 { margin:0; font-size:17px; font-weight:bold; letter-spacing:5px; }
#title-box p  { margin:3px 0 0; font-size:9.5px; opacity:0.72; letter-spacing:2.5px; }

#legend {
  position:absolute; bottom:52px; left:18px; z-index:1000;
  background:rgba(10,6,2,0.68); color:white; padding:10px 14px; border-radius:6px;
  font-size:11px; line-height:1.5; border:1px solid rgba(255,255,255,0.18); backdrop-filter:blur(4px);
  min-width:130px;
}
#legend .sec { font-size:9px; opacity:0.5; margin:7px 0 3px; letter-spacing:1px; }
#legend .row { display:flex; align-items:center; gap:7px; margin:3px 0; }
.l-line { width:24px; height:4px; border-radius:2px; flex-shrink:0; }
.l-dot  { width:10px; height:10px; border-radius:50%; border:2px solid white; flex-shrink:0; }

/* 右侧控制面板 */
#panel {
  position:absolute; top:14px; right:14px; z-index:1000;
  display:flex; flex-direction:column; gap:5px; align-items:flex-end;
  max-width:220px;
}
.p-row { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
.p-btn {
  background:rgba(10,6,2,0.70); color:white;
  border:1px solid rgba(255,255,255,0.25);
  padding:5px 11px; border-radius:4px; font-size:11px;
  cursor:pointer; font-family:inherit; backdrop-filter:blur(4px);
  white-space:nowrap; line-height:1.4;
}
.p-btn:hover { background:rgba(50,30,5,0.88); }
.p-btn.active-layer { background:rgba(160,90,15,0.88); border-color:#d8a040; }
.p-btn.active-draw  { border-width:2px; }
.p-btn.green  { background:rgba(15,70,15,0.85); border-color:#50b050; }
.p-btn.green:hover { background:rgba(20,90,20,0.92); }
.p-btn.paused { background:rgba(15,60,15,0.85); border-color:#50b050; }

/* 颜色选择器 */
#color-bar { display:flex; gap:5px; align-items:center; }
.c-dot {
  width:18px; height:18px; border-radius:50%;
  cursor:pointer; border:2px solid rgba(255,255,255,0.35);
  flex-shrink:0; transition:transform 0.1s;
}
.c-dot:hover   { transform:scale(1.2); }
.c-dot.selected { border:2.5px solid white; transform:scale(1.18); }

/* 路线列表 */
#route-list { display:flex; flex-direction:column; gap:4px; width:100%; }
.route-row {
  display:flex; align-items:center; gap:5px;
  background:rgba(10,6,2,0.65); border:1px solid rgba(255,255,255,0.15);
  border-radius:4px; padding:4px 7px; backdrop-filter:blur(4px);
}
.route-swatch { width:22px; height:4px; border-radius:2px; flex-shrink:0; }
.route-name   { flex:1; color:white; font-size:11px; }
.route-btn    { background:none; border:none; color:rgba(255,255,255,0.75); cursor:pointer; font-size:12px; padding:1px 3px; }
.route-btn:hover { color:white; }

/* 画线进行中的控制条 - 底部浮动 */
#draw-ctrl {
  display:none;
  position:absolute; bottom:52px; left:50%; transform:translateX(-50%);
  z-index:1001;
  background:rgba(10,6,2,0.88); border:1px solid rgba(255,255,255,0.3);
  border-radius:8px; padding:8px 14px; backdrop-filter:blur(6px);
  white-space:nowrap;
}
#draw-ctrl .label { font-size:11px; color:rgba(255,255,255,0.75); margin-bottom:6px; text-align:center; }
#draw-ctrl .btns  { display:flex; gap:7px; align-items:center; }

/* 截图模式按钮 */
#shot-btn {
  position:absolute; top:18px; left:60px; z-index:1001;
  background:rgba(10,6,2,0.70); color:white;
  border:1px solid rgba(255,255,255,0.25);
  padding:6px 12px; border-radius:4px; font-size:12px;
  cursor:pointer; font-family:inherit; backdrop-filter:blur(4px);
}
#shot-btn:hover { background:rgba(50,30,5,0.88); }

/* 截图模式提示 */
#shot-tip {
  display:none;
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:1002; background:rgba(10,6,2,0.82); color:white;
  padding:14px 28px; border-radius:8px; font-size:14px; text-align:center;
  border:1px solid rgba(255,255,255,0.3); backdrop-filter:blur(6px);
  pointer-events:none;
}

#status-bar { display:none; }
</style>
</head>

k="startDraw(routes[6])">✏️</button><button class="route-btn" title="清除路线" onclick="clearRoute(routes[6])">🗑</button></div><div class="route-row" id="route-row-8"><div class="route-swatch" style="background:#28a040"></div><span class="route-name">路线9</span><button class="route-btn" title="绘制" onclick="startDraw(routes[7])">✏️</button><button class="route-btn" title="清除路线" onclick="clearRoute(routes[7])">🗑</button></div><div class="route-row" id="route-row-9"><div class="route-swatch" style="background:#8040c0"></div><span class="route-name">路线10</span><button class="route-btn" title="绘制" onclick="startDraw(routes[8])">✏️</button><button class="route-btn" title="清除路线" onclick="clearRoute(routes[8])">🗑</button></div></div>

<script>
// ============================================================
// 地图初始化
// ============================================================
// 管理员模式：URL 含 ?admin 才能编辑
var isAdmin = location.search.includes('admin');
if (isAdmin) {
  document.getElementById('panel').style.display = 'flex';
}

var canvasRenderer = L.canvas({ padding: 0.5 });
var map = L.map('map', {
  center: [38.0600, 114.2580], zoom: 16,
  zoomControl: true, doubleClickZoom: false
});
var satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'Tiles © Esri', maxZoom:19 });
var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 });
satLayer.addTo(map);

function switchLayer(t) {
  if (t === 'sat') { map.removeLayer(osmLayer); satLayer.addTo(map); }
  else             { map.removeLayer(satLayer); osmLayer.addTo(map); }
  document.getElementById('btn-sat').className = 'p-btn' + (t==='sat' ? ' active-layer' : '');
  document.getElementById('btn-osm').className = 'p-btn' + (t==='osm' ? ' active-layer' : '');
}

// ============================================================
// 颜色面板
// ============================================================
var PALETTE = ['#e07020','#2878c8','#d03030','#28a040','#8040c0','#c8a020','#c83060','#2090a8','#7a5020'];
var selectedColor = PALETTE[0];

(function buildColorBar() {
  var bar = document.getElementById('color-bar');
  PALETTE.forEach(function(c) {
    var d = document.createElement('div');
    d.className = 'c-dot' + (c === selectedColor ? ' selected' : '');
    d.style.background = c;
    d.title = c;
    d.onclick = function() {
      selectedColor = c;
      document.querySelectorAll('.c-dot').forEach(function(x){ x.classList.remove('selected'); });
      d.classList.add('selected');
    };
    bar.appendChild(d);
  });
})();

// ============================================================
// 路线管理
// ============================================================
var routes = [];
var nextRouteId = 1;
var drawing = null;   // 当前正在画的 route 对象
var paused  = false;
var previewLine = null;

var STORAGE_ROUTES  = 'lingyan_routes_v2';
var STORAGE_MARKERS = 'lingyan_markers_v2';
var STORAGE_CUSTOM  = 'lingyan_custom_v2';

function saveRoutesToStorage() {
  localStorage.setItem(STORAGE_ROUTES, JSON.stringify(
    routes.map(function(r){ return { name:r.name, color:r.color, pts:r.pts }; })
  ));
}

function renderLine(pts, existing, color) {
  if (existing) {
    if (existing._casing) map.removeLayer(existing._casing);
    map.removeLayer(existing);
  }
  if (!pts || pts.length < 2) return null;
  var casing = L.polyline(pts, { color:'white', weight:5.5, opacity:0.38, lineJoin:'round', lineCap:'round', renderer:canvasRenderer }).addTo(map);
  var line   = L.polyline(pts, { color:color,   weight:3,   opacity:0.82, lineJoin:'round', lineCap:'round', renderer:canvasRenderer }).addTo(map);
  line._casing = casing;
  return line;
}

function renderRouteList() {
  var list = document.getElementById('route-list');
  list.innerHTML = '';
  routes.forEach(function(r, i) {
    var div = document.createElement('div');
    div.className = 'route-row';
    div.id = 'route-row-' + r.id;
    div.innerHTML =
      '<div class="route-swatch" style="background:'+r.color+'"></div>' +
      '<span class="route-name" title="双击改名" ondblclick="renameRoute(routes['+i+'],this)" style="cursor:text;">'+r.name+'</span>' +
      '<button class="route-btn" title="绘制" onclick="startDraw(routes['+i+'])">✏️</button>' +
      '<button class="route-btn" title="清除路线" onclick="clearRoute(routes['+i+'])">🗑</button>';
    list.appendChild(div);
  });
  renderLegend();
}

function addNewRoute(name, color, pts) {
  var r = {
    id: nextRouteId++,
    name: name || ('路线' + nextRouteId),
    color: color || selectedColor,
    pts: pts || [],
    line: null
  };
  r.line = renderLine(r.pts, null, r.color);
  routes.push(r);
  renderRouteList();
  saveRoutesToStorage();
  startDraw(r);
}

function clearRoute(r) {
  if (drawing === r) finishDraw();
  if (r.line) {
    if (r.line._casing) map.removeLayer(r.line._casing);
    map.removeLayer(r.line); r.line = null;
  }
  r.pts = [];
  saveRoutesToStorage();
  renderRouteList();
}

// ============================================================
// 画线逻辑
// ============================================================
function startDraw(r) {
  if (drawing) finishDraw();
  drawing = r;
  paused = false;
  map.getContainer().style.cursor = 'crosshair';
  document.getElementById('draw-ctrl').style.display = 'block';
  document.getElementById('draw-label').textContent = r.name + ' 绘制中';
  document.getElementById('draw-label').style.color = r.color;
  document.getElementById('btn-pause').textContent = '⏸ 暂停';
  document.getElementById('btn-pause').classList.remove('paused');
  setStatus('「' + r.name + '」绘制中 · 单击添加点 · 双击完成', r.color);
}

function finishDraw() {
  if (!drawing) return;
  if (previewLine) { map.removeLayer(previewLine); previewLine = null; }
  // 重新渲染确保线条保留
  drawing.line = renderLine(drawing.pts, drawing.line, drawing.color);
  saveRoutesToStorage();
  drawing = null;
  paused = false;
  map.getContainer().style.cursor = '';
  document.getElementById('draw-ctrl').style.display = 'none';
  setStatus('标注可拖拽 · 选颜色后点「新增路线」开始绘制 · 点「新建地标」添加标注', null);
}

function togglePause() {
  if (!drawing) return;
  paused = !paused;
  var btn = document.getElementById('btn-pause');
  if (paused) {
    btn.textContent = '▶ 继续'; btn.classList.add('paused');
    map.getContainer().style.cursor = '';
    if (previewLine) { map.removeLayer(previewLine); previewLine = null; }
    setStatus('已暂停 · 可自由缩放移动 · 点「继续」接着画', null);
  } else {
    btn.textContent = '⏸ 暂停'; btn.classList.remove('paused');
    map.getContainer().style.cursor = 'crosshair';
    setStatus('「' + drawing.name + '」绘制中 · 单击添加点 · 双击完成', drawing.color);
  }
}

function undoPoint() {
  if (!drawing) return;
  if (drawing.pts.length > 0) drawing.pts.pop();
  drawing.line = renderLine(drawing.pts, drawing.line, drawing.color);
}

function clearDrawing() {
  if (!drawing) return;
  drawing.pts = [];
  if (drawing.line) {
    if (drawing.line._casing) map.removeLayer(drawing.line._casing);
    map.removeLayer(drawing.line); drawing.line = null;
  }
}

map.on('click', function(e) {
  // 新建地标模式
  if (addingLandmark) {
    placeNewLandmark(e.latlng); return;
  }
  if (!drawing || paused) return;
  drawing.pts.push([e.latlng.lat, e.latlng.lng]);
  drawing.line = renderLine(drawing.pts, drawing.line, drawing.color);
});

map.on('mousemove', function(e) {
  if (!drawing || paused) return;
  if (drawing.pts.length === 0) return;
  var preview = drawing.pts.concat([[e.latlng.lat, e.latlng.lng]]);
  if (previewLine) map.removeLayer(previewLine);
  previewLine = L.polyline(preview, {
    color: drawing.color, weight:3, opacity:0.5,
    dashArray:'6,5', lineJoin:'round', lineCap:'round'
  }).addTo(map);
});

map.on('dblclick', function(e) {
  if (!drawing || paused) return;
  // 双击前 click 已加了一个多余的点，删掉
  if (drawing.pts.length > 0) drawing.pts.pop();
  finishDraw();
});

function placeNewLandmark(latlng) {
  var name = prompt('地标名称：');
  if (!name) { return; }
  var m = addPOI([latlng.lat, latlng.lng], name, selectedColor, true);
  customMarkers.push({ name: name, color: selectedColor, latlng: [latlng.lat, latlng.lng] });

  addingLandmark = false;
  document.getElementById('btn-lm').style.background = '';
  document.getElementById('btn-lm').style.borderColor = '';
  map.getContainer().style.cursor = '';

function poiIcon(name, color) {
  var paths = POI_SVG[name] || '<circle cx="10" cy="10" r="5" fill="white"/>';
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="14" height="14">'+paths+'</svg>';
  return L.divIcon({
    className: '',
    html: '<div style="display:flex;flex-direction:column;align-items:center;cursor:grab;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7));">' +
      '<div style="background:'+color+';border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,0.9);">'+svg+'</div>' +

      '</div>',
    iconSize: null, iconAnchor: [13, 13]
  });
}

function addPOI(latlng, name, color, isCustom) {
  var marker = L.marker(latlng, { icon: poiIcon(name, color), draggable: isAdmin, zIndexOffset: 500 }).addTo(map);
  marker.on('dragend', function(e) {
    savePos(name, e.target.getLatLng());
    if (isCustom) {
      // 更新自定义地标坐标
      var ll = e.target.getLatLng();
      customMarkers.forEach(function(m){ if(m.name===name){ m.latlng=[ll.lat,ll.lng]; } });
      saveCustomMarkers();
    }
  });
  return marker;
}

(function loadRoutes() {
  try {
    var data = JSON.parse(localStorage.getItem(STORAGE_ROUTES)) || [];
    if (data.length > 0) {
      data.forEach(function(d) {
        var r = { id: nextRouteId++, name: d.name, color: d.color, pts: d.pts || [], line: null };
        r.line = renderLine(r.pts, null, r.color);
        routes.push(r);
      });
    } else {
      // 首次：创建两条默认路线（不自动进入画线模式）
      routes.push({ id: nextRouteId++, name: '路线1', color: '#e07020', pts: [], line: null });
      routes.push({ id: nextRouteId++, name: '路线2', color: '#2878c8', pts: [], line: null });
    }
  } catch(e) {
    routes.push({ id: nextRouteId++, name: '路线1', color: '#e07020', pts: [], line: null });
    routes.push({ id: nextRouteId++, name: '路线2', color: '#2878c8', pts: [], line: null });
  }
  renderRouteList();
})();

// 图例

function renameRoute(r, el) {
  var input = document.createElement('input');
  input.value = r.name;
  input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid white;color:white;font-size:11px;width:70px;outline:none;';
  el.replaceWith(input);
  input.focus(); input.select();
  function done() {
    var val = input.value.trim();
    if (val) { r.name = val; }
    saveRoutesToStorage();
    renderRouteList();
    renderLegend();
  }
  input.addEventListener('blur', done);
  input.addEventListener('keydown', function(e){ if(e.key==='Enter') input.blur(); });
}

function renderLegend() {
  var html = '<div class="sec">路线</div>';
  routes.forEach(function(r) {
    if (r.pts.length > 0) {
      html += '<div class="row"><div class="l-line" style="background:'+r.color+'"></div><span>'+r.name+'</span></div>';
    }
  });
  html += '<div class="sec">标注</div>';
  var dotTypes = [
    { color:'#7b5ea7', label:'宗教场所' },
    { color:'#b86018', label:'景点' },
    { color:'#2d7828', label:'餐饮' },
    { color:'#3d78a8', label:'设施' },
    { color:'#1d4ed8', label:'学府' },
    { color:'#6b7280', label:'企业' },
    { color:'#4a6fa5', label:'停车场' },
    { color:'#5c7a3e', label:'亭子' },
    { color:'#7c6f5e', label:'遗址' },
    { color:'#5c3d12', label:'最高处' }
  ];
  dotTypes.forEach(function(t){
    html += '<div class="row"><div class="l-dot" style="background:'+t.color+'"></div><span>'+t.label+'</span></div>';
  });
  document.getElementById('legend').innerHTML = html;
}

// 截图模式

var shotMode = false;
function toggleShotMode(hide) {
  shotMode = hide;
  var els = ['#panel','#status-bar','#draw-ctrl','#shot-btn','#shot-tip','.leaflet-control-zoom','.leaflet-control-attribution'];
  els.forEach(function(sel){
    document.querySelectorAll(sel).forEach(function(el){
      el.style.visibility = hide ? 'hidden' : '';
    });
  });
}

function exportHighRes() {
  toggleShotMode(true);
  setTimeout(function() {
    html2canvas(document.body, {
      useCORS: true, scale: 2, logging: false, allowTaint: false,
      width: window.innerWidth, height: window.innerHeight
    }).then(function(canvas) {
      toggleShotMode(false);
      var link = document.createElement('a');
      link.download = '灵山登山路线图.png';
      link.href = canvas.toDataURL('image/png', 1.0);
      link.click();
    }).catch(function() {
      toggleShotMode(false);
      alert('导出失败，请手动截图');
    });
  }, 600);
}

document.addEventListener('keydown', function(e){
  if((e.key==='p'||e.key==='P') && !e.ctrlKey && !e.metaKey) exportHighRes();
});

function setStatus(text, color) {
  if (!isAdmin) return; // 非管理员不显示操作提示
  var el = document.getElementById('status-bar');
  el.textContent = text;
  el.style.borderColor = color ? color : 'rgba(255,255,255,0.18)';
  el.style.background   = color ? 'rgba(10,6,2,0.82)' : 'rgba(10,6,2,0.72)';
}

// ============================================================
// 导出文件
// ============================================================
function exportFile() {
  var savedPos = loadSavedPos();

  var poisJS = defaultPOIs.map(function(p) {
    var ll = savedPos[p.id] ? savedPos[p.id] : p.latlng;
    return '  { id:\''+p.id+'\', latlng:['+ll[0].toFixed(6)+','+ll[1].toFixed(6)+'], color:\''+p.color+'\' }';
  }).join(',\n');

  var customJS = customMarkers.map(function(m) {
    var ll = savedPos[m.name] ? savedPos[m.name] : m.latlng;
    return '  { name:\''+m.name+'\', latlng:['+ll[0].toFixed(6)+','+ll[1].toFixed(6)+'], color:\''+m.color+'\' }';
  }).join(',\n');

  var routesJS = routes.map(function(r) {
    var ptsStr = r.pts.length > 0
      ? '[\n' + r.pts.map(function(p){ return '      ['+p[0].toFixed(6)+','+p[1].toFixed(6)+']'; }).join(',\n') + '\n    ]'
      : '[]';
    return '  { name:\''+r.name+'\', color:\''+r.color+'\', pts:'+ptsStr+' }';
  }).join(',\n');

  // 生成固化后的 HTML（坐标全部写死）
  var out = document.documentElement.outerHTML;
  out = out.replace(/var defaultPOIs = \[[\s\S]*?\];/, 'var defaultPOIs = [\n'+poisJS+'\n];');
  out = out.replace(/customMarkers\s*=\s*\[\];/, 'customMarkers = [\n'+customJS+'\n];');
  // 清空 localStorage 调用（已固化，不再需要）
  var blob = new Blob([out], { type:'text/html;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'lingyan_map_saved.html';
  a.click();
}
